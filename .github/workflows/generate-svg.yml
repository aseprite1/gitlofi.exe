name: Generate Drum Pattern SVG

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      username:
        description: 'GitHub username'
        required: true
        default: ${{ github.repository_owner }}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npx tsx scripts/generate-svg.ts ${{ inputs.username || github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/drum-pattern.svg
          git diff --staged --quiet || git commit -m "Update drum pattern SVG"
          git push
