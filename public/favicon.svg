<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cassette body -->
  <rect x="2" y="6" width="28" height="20" rx="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <rect x="3" y="7" width="26" height="18" fill="#d4c4a8" stroke="#5c4a32" stroke-width="0.5"/>
  <!-- Label area -->
  <rect x="5" y="8" width="22" height="10" rx="1" fill="#f0e6d0" stroke="#8b7355" stroke-width="0.5"/>

  <!-- Pixel G (shifted to center: start x=7, y=10) -->
  <rect x="7" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="8" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="9" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="6" y="11" width="1" height="1" fill="#5c4a32"/>
  <rect x="6" y="12" width="1" height="1" fill="#5c4a32"/>
  <rect x="6" y="13" width="1" height="1" fill="#5c4a32"/>
  <rect x="8" y="13" width="1" height="1" fill="#5c4a32"/>
  <rect x="9" y="13" width="1" height="1" fill="#5c4a32"/>
  <rect x="6" y="14" width="1" height="1" fill="#5c4a32"/>
  <rect x="9" y="14" width="1" height="1" fill="#5c4a32"/>
  <rect x="7" y="15" width="1" height="1" fill="#5c4a32"/>
  <rect x="8" y="15" width="1" height="1" fill="#5c4a32"/>
  <rect x="9" y="15" width="1" height="1" fill="#5c4a32"/>

  <!-- Pixel I (start x=13, y=10) -->
  <rect x="12" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="13" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="14" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="13" y="11" width="1" height="1" fill="#5c4a32"/>
  <rect x="13" y="12" width="1" height="1" fill="#5c4a32"/>
  <rect x="13" y="13" width="1" height="1" fill="#5c4a32"/>
  <rect x="13" y="14" width="1" height="1" fill="#5c4a32"/>
  <rect x="12" y="15" width="1" height="1" fill="#5c4a32"/>
  <rect x="13" y="15" width="1" height="1" fill="#5c4a32"/>
  <rect x="14" y="15" width="1" height="1" fill="#5c4a32"/>

  <!-- Pixel T (start x=18, y=10) -->
  <rect x="17" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="18" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="19" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="20" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="21" y="10" width="1" height="1" fill="#5c4a32"/>
  <rect x="19" y="11" width="1" height="1" fill="#5c4a32"/>
  <rect x="19" y="12" width="1" height="1" fill="#5c4a32"/>
  <rect x="19" y="13" width="1" height="1" fill="#5c4a32"/>
  <rect x="19" y="14" width="1" height="1" fill="#5c4a32"/>
  <rect x="19" y="15" width="1" height="1" fill="#5c4a32"/>

  <!-- Tape reels -->
  <circle cx="11" cy="22" r="3" fill="#2a2a1a" stroke="#808080" stroke-width="0.5"/>
  <circle cx="21" cy="22" r="3" fill="#2a2a1a" stroke="#808080" stroke-width="0.5"/>
  <circle cx="11" cy="22" r="1.5" fill="none" stroke="#5c4a32" stroke-width="0.5"/>
  <circle cx="21" cy="22" r="1.5" fill="none" stroke="#5c4a32" stroke-width="0.5"/>
  <!-- Tape window -->
  <rect x="13" y="20" width="6" height="4" rx="0.5" fill="#1a1a10" stroke="#808080" stroke-width="0.3"/>
  <line x1="14" y1="22" x2="18" y2="22" stroke="#8b7355" stroke-width="0.3"/>
  <!-- Screw holes -->
  <circle cx="5" cy="9" r="0.8" fill="#808080"/>
  <circle cx="27" cy="9" r="0.8" fill="#808080"/>
  <circle cx="5" cy="25" r="0.8" fill="#808080"/>
  <circle cx="27" cy="25" r="0.8" fill="#808080"/>
</svg>
